<style>
  /* =========================================
     CG INFO SECTION — Elementor HTML Widget
     Fuentes: Julius Sans One + Montserrat
     (ya cargadas por el tema WordPress)
  ========================================= */

  .cg-info {
    padding: 52px 32px;
    box-sizing: border-box;
  }

  /* Grid principal: 3 columnas */
  .cg-info__grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    gap: 0;
    align-items: start;
    max-width: 1180px;
    margin: 0 auto;
  }

  /* Separador vertical entre columnas */
  .cg-info__col {
    padding: 0 36px;
  }

  .cg-info__col:not(:last-child) {
    border-right: 1px solid rgba(255, 255, 255, 0.12);
  }

  .cg-info__col:first-child {
    padding-left: 0;
  }

  .cg-info__col:last-child {
    padding-right: 0;
  }

  /* Título de columna */
  .cg-info__title {
    font-family: 'Julius Sans One', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #99cc00;
    margin: 0 0 22px 0;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(153, 204, 0, 0.25);
  }

  /* Links */
  .cg-info a {
    color: #cccccc;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .cg-info a:hover {
    color: #99cc00;
  }

  /* Texto general */
  .cg-info__text {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    color: #cccccc;
    line-height: 1.7;
    margin: 0;
  }

  /* ---- Columna Kontakt ---- */
  .cg-info__contact-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .cg-info__contact-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .cg-info__contact-icon {
    color: #99cc00;
    font-size: 1.05rem;
    margin-top: 3px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }

  .cg-info__contact-body {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .cg-info__contact-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #99cc00;
  }

  .cg-info__contact-value {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    color: #cccccc;
    line-height: 1.6;
  }

  /* ---- Columna Dokumente ---- */
  .cg-info__docs {
    display: flex;
    justify-content: flex-start;
    gap: 36px;
  }

  .cg-info__doc {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    cursor: pointer;
  }

  .cg-info__doc-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 70px;
    height: 70px;
    border: 1.5px solid #99cc00;
    border-radius: 50%;
    color: #99cc00;
    font-size: 1.6rem;
    transition: background-color 0.25s ease, color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  }

  .cg-info__doc:hover .cg-info__doc-icon {
    background-color: #99cc00;
    color: #2e2e2e;
    transform: scale(1.08);
    box-shadow: 0 0 18px rgba(153, 204, 0, 0.35);
  }

  .cg-info__doc-label {
    font-family: 'Julius Sans One', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aaaaaa;
    transition: color 0.2s ease;
    white-space: nowrap;
  }

  .cg-info__doc:hover .cg-info__doc-label {
    color: #99cc00;
  }

  /* ---- Responsive: tablet ---- */
  @media (max-width: 860px) {
    .cg-info__grid {
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    .cg-info__col {
      padding: 0;
      border-right: none !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 28px;
    }
    .cg-info__col:last-child {
      grid-column: 1 / -1;
      border-bottom: none;
      padding-bottom: 0;
    }
  }

  /* ---- Responsive: móvil ---- */
  @media (max-width: 560px) {
    .cg-info {
      padding: 40px 20px;
    }
    .cg-info__grid {
      grid-template-columns: 1fr;
      gap: 28px;
    }
    .cg-info__col:last-child {
      grid-column: auto;
    }
    .cg-info__docs {
      gap: 28px;
    }
  }
</style>
