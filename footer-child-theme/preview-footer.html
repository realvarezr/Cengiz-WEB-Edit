<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview – CG Footer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Montserrat:wght@400;500&display=swap">
  <link rel="stylesheet" href="assets/css/footer.css">
  <style>
    body { margin: 0; background: #2a2a2a; }
  </style>
</head>
<body>

<footer class="cg-footer" role="contentinfo">

  <div class="cg-footer__inner">
    <div class="cg-footer__grid">

      <!-- Columna 1: Logo -->
      <div class="cg-footer__col">
        <a href="/" class="cg-footer__logo-link" aria-label="Cengiz Gastro – Startseite">
          <img src="https://cengiz-gastro.de/wp-content/uploads/2023/02/cropped-cropped-Logo-Cengiz-White@2560x.png"
               alt="Cengiz Gastro"
               class="cg-footer__logo">
        </a>
      </div>

      <!-- Columna 2: Schnellzugang -->
      <div class="cg-footer__col">
        <h3 class="cg-footer__title">Schnellzugang</h3>
        <ul class="cg-footer__nav-list">
          <li><a href="/" class="cg-footer__nav-link">Startseite</a></li>
          <li><a href="/events/" class="cg-footer__nav-link">Events</a></li>
          <li><a href="/kindergeburtstag/" class="cg-footer__nav-link">Kindergeburtstag</a></li>
          <li><a href="/karriere/" class="cg-footer__nav-link">Karriere</a></li>
          <li><a href="mailto:event@cengiz-gastro.de" class="cg-footer__nav-link">Kontakt</a></li>
        </ul>
      </div>

      <!-- Columna 3: Folge uns -->
      <div class="cg-footer__col">
        <h3 class="cg-footer__title">Folge uns</h3>
        <div class="cg-footer__social">
          <a href="https://www.instagram.com/cengiz.schwimmbadgastronomie/"
             target="_blank" rel="noopener"
             class="cg-footer__social-icon"
             aria-label="Cengiz Gastro auf Instagram">
            <i class="fab fa-instagram" aria-hidden="true"></i>
          </a>
          <a href="https://www.facebook.com/entspannt.geniessen"
             target="_blank" rel="noopener"
             class="cg-footer__social-icon"
             aria-label="Cengiz Gastro auf Facebook">
            <i class="fab fa-facebook-f" aria-hidden="true"></i>
          </a>
        </div>
      </div>

    </div><!-- /.cg-footer__grid -->
  </div><!-- /.cg-footer__inner -->

  <!-- Barra de copyright -->
  <div class="cg-footer__bar">
    <div class="cg-footer__bar-inner">
      <span class="cg-footer__bar-copy">
        &copy; 2026 Cengiz Gastro
      </span>
      <span class="cg-footer__bar-links">
        <a href="/impressum/">Impressum</a>
        <a href="/datenschutz/">Datenschutz</a>
      </span>
      <span class="cg-footer__powered">
        Powered by
        <a href="https://studio.am-itsolutions.de" target="_blank" rel="noopener">
          studio.am-itsolutions.de
        </a>
      </span>
    </div>
  </div>

</footer>

</body>
</html>
